name: Testing Configuration Variables

on: 
  workflow_dispatch:

env:
  cloud: google-cloud

jobs:
  greeting_job:
    runs-on: ubuntu-latest
    env:
      Greeting: Hello
      First_Name: Aswini
    steps:
      - name: "Say Hello to Aswini"
        run: echo "$Greeting $First_Name is using $cloud with project ${{vars.PROJECT_ID}}!"
